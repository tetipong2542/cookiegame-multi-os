# ==============================================================================
# CookieGame Bot Configuration - Hybrid Obstacle Detection System (Phase 2)
# ==============================================================================
# แก้ค่าที่นี่แล้วบันทึก → บอทจะโหลดค่าใหม่ตอน start ครั้งถัดไป
# หากไฟล์นี้พัง/อ่านไม่ได้ → บอทจะ fallback ไปใช้ default config (hardcoded)
#
# User override path:
#   Windows: %LOCALAPPDATA%\CookieGame\config.yaml
#   Mac:     ~/Library/Application Support/CookieGame/config.yaml
#
# Bundled default: ตัวนี้ (เข้ามาพร้อม .exe)
# ==============================================================================

config_version: 1

# ------------------------------------------------------------------------------
# Hybrid Detection System - ระบบตรวจจับ obstacle แบบ layered voting
# ------------------------------------------------------------------------------
detection:
  enabled: true              # true = ใช้ hybrid detector, false = ปิด (fallback random jump)
  detection_hz: 10           # ตรวจทุก 100ms (ค่ายิ่งสูง = ตรวจถี่ = CPU สูงขึ้น)
  warmup_seconds: 3          # skip 8s แรกของแต่ละรอบ (รอ MOG2 learn background)

# ------------------------------------------------------------------------------
# ROI Zones - Region of Interest สำหรับตรวจ obstacle
# LDPlayer 1280x720, obstacle เข้าจากขวาไปซ้าย, Cookie fixed X≈300
# ------------------------------------------------------------------------------
zones:
  # Format: [x1, y1, x2, y2] - rectangular region ข้างหน้า Cookie
  high: [350, 150, 750, 480] # ระดับหัว Cookie → obstacle ตรงนี้ = ต้อง Jump
  low:  [350, 480, 750, 570] # ระดับเท้า Cookie → obstacle ตรงนี้ = ต้อง Slide

# ------------------------------------------------------------------------------
# MOG2 Background Subtractor - เรียนรู้ background แต่ละ biome เอง
# ------------------------------------------------------------------------------
mog2:
  history: 500               # จำ 500 frame ล่าสุด (มากขึ้น = ปรับตัวช้าลงเมื่อ biome เปลี่ยน)
  var_threshold: 25          # sensitivity - ค่าต่ำ = ไวขึ้น (แต่ false positive เพิ่ม)
  detect_shadows: false      # false เพราะเงาในเกมไม่เกี่ยว
  min_pixels_trigger: 3000    # foreground pixel count > 500 = มี obstacle ใน zone

# ------------------------------------------------------------------------------
# Canny Edge Detector - color-agnostic (biome ไหนก็ทำงาน)
# ------------------------------------------------------------------------------
canny:
  low_threshold: 50          # edge detection lower bound (สูงขึ้น = จับ edge น้อยลง)
  high_threshold: 150        # edge detection upper bound
  min_edges_trigger: 800     # edge count > 300 ใน zone = มี obstacle

# ------------------------------------------------------------------------------
# Template Matching Thresholds
# ------------------------------------------------------------------------------
template:
  ingame2_threshold: 0.75    # Slide obstacle template match threshold
  # ingame3_threshold: 0.75  # Double Jump obstacle (สร้างเมื่อ crop เสร็จในอนาคต)

# ------------------------------------------------------------------------------
# Voting System - รวม 3 sources → คะแนน → ตัดสินใจ action
# ------------------------------------------------------------------------------
voting:
  weights:
    template: 3              # confidence สูงสุด (ถ้า template ตรงเป๊ะ)
    mog2: 2                  # confidence กลาง (adaptive)
    canny: 1                 # confirmation (color-agnostic)
  action_threshold: 3        # คะแนนรวม >= 3 → trigger action
  # ตัวอย่าง: template only (3) หรือ MOG2+Canny (3) → trigger
  #          MOG2 only (2) → ไม่ trigger (รอ confirmation)

# ------------------------------------------------------------------------------
# Per-Action Cooldown - ป้องกัน action ซ้อนกัน
# ------------------------------------------------------------------------------
cooldowns:
  jump: 0.4                  # หลัง jump รอ 400ms
  slide: 0.8                 # slide ยาว → รอ 800ms
  double_jump: 0.6

# ------------------------------------------------------------------------------
# Random Double Jump - Safety net สำหรับ obstacle สูงที่ template ไม่จับ
# ------------------------------------------------------------------------------
double_jump:
  random_probability: 0.30   # 30% ของ jump event → double
  gap_seconds: 0.12          # gap ระหว่าง tap ครั้งที่ 1 และ 2

# ------------------------------------------------------------------------------
# Crash Log - บันทึก state ตอนตาย → user เอาไป analyze/crop template เพิ่ม
# ------------------------------------------------------------------------------
crash_log:
  enabled: true
  short_run_threshold_sec: 8 # รอบวิ่ง < 8s = crash → log
  save_last_n_frames: 10     # เก็บ frame ก่อนตาย 10 frames
  save_decision_log: true    # เก็บ log การตัดสินใจ (decisions.json)
  # Output path:
  #   Windows: %LOCALAPPDATA%\CookieGame\crash_log\YYYYMMDD_HHMMSS\
  #   Mac:     ~/Library/Application Support/CookieGame/crash_log/YYYYMMDD_HHMMSS/

# ------------------------------------------------------------------------------
# Debug Mode - เก็บ log ทุก round (ไม่ใช่แค่ crash) สำหรับ tune ROI/threshold
# ------------------------------------------------------------------------------
debug:
  enabled: true              # เปิด debug mode ทั้งระบบ
  log_every_detection: true  # print [detect] ทุก tick ที่ detector.detect() ทำงาน
  log_zone_stats: true       # include MOG2 px + Canny edges ใน log
  save_all_runs: true        # save decisions.json/summary.json ทุก round (ไม่ใช่แค่ crash)
  save_debug_frames: true    # save roi_debug_start.png + roi_debug_last.png
  # Output path (per round):
  #   Windows: %LOCALAPPDATA%\CookieGame\logs\runs\YYYYMMDD_HHMMSS\
  #   Mac:     ~/Library/Application Support/CookieGame/logs/runs/YYYYMMDD_HHMMSS/
  # Files:
  #   - decisions.json      (all detection ticks + scores + votes)
  #   - summary.json        (aggregated stats for the run)
  #   - config_used.yaml    (snapshot of config at run start)
  #   - roi_debug_start.png (first frame with ROI overlay)
  #   - roi_debug_last.png  (last frame with ROI overlay)
